name: Infrastructure Deploy

# terraform-init, terraform-plan, and terraform-apply are separate standalone
# jobs (each does its own `terraform init` since GitHub Actions jobs run on
# fresh runners), but they trigger automatically in sequence on every push to
# main that touches terraform/**. `needs:` controls the order: init -> plan ->
# apply. Destroy remains manual-only for safety.

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/infrastructure-deploy.yml"
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Only used to run destroy. Type "destroy" to confirm.'
        required: false
        type: string

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: terraform
  TF_VERSION: "1.7.5"
  CI_IAM_USER_ARN: "arn:aws:iam::232428703462:user/cicd_user"

jobs:
  # ---------------------------------------------------------------
  # STANDALONE: terraform init + validate
  # ---------------------------------------------------------------
  terraform-init:
    name: Terraform Init
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Fmt Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

  # ---------------------------------------------------------------
  # STANDALONE: terraform plan (runs after init succeeds)
  # ---------------------------------------------------------------
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: terraform-init
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Reconcile drifted resources (import if exists in AWS but not in state)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          import_if_missing() {
            local address="$1"
            local id="$2"
            if terraform state list | grep -qx "$address"; then
              echo "Already in state: $address"
            else
              echo "Not in state, attempting import: $address ($id)"
              terraform import -var="ci_iam_user_arn=${{ env.CI_IAM_USER_ARN }}" "$address" "$id" || echo "Import failed or resource doesn't exist yet — will be created fresh: $address"
            fi
          }

          import_if_missing "module.database.aws_elasticache_subnet_group.starttech" "starttech-redis-subnet-group"
          import_if_missing "module.eks.aws_iam_role.eks_cluster_role" "starttech-eks-cluster-role"
          import_if_missing "module.eks.aws_iam_role.eks_node_role" "starttech-eks-node-role"
          import_if_missing "module.storage.aws_ecr_repository.starttech-backend-api" "starttech-backend-api"

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -target=module.networking \
            -target=module.eks \
            -target=module.storage \
            -target=module.database \
            -var="mongodb_atlas_uri=${{ secrets.MONGODB_ATLAS_URI }}" \
            -var="ci_iam_user_arn=${{ env.CI_IAM_USER_ARN }}"

  # ---------------------------------------------------------------
  # STANDALONE: terraform apply (runs after plan succeeds)
  # ---------------------------------------------------------------
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Reconcile drifted resources (import if exists in AWS but not in state)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          import_if_missing() {
            local address="$1"
            local id="$2"
            if terraform state list | grep -qx "$address"; then
              echo "Already in state: $address"
            else
              echo "Not in state, attempting import: $address ($id)"
              terraform import -var="ci_iam_user_arn=${{ env.CI_IAM_USER_ARN }}" "$address" "$id" || echo "Import failed or resource doesn't exist yet — will be created fresh: $address"
            fi
          }

          import_if_missing "module.database.aws_elasticache_subnet_group.starttech" "starttech-redis-subnet-group"
          import_if_missing "module.eks.aws_iam_role.eks_cluster_role" "starttech-eks-cluster-role"
          import_if_missing "module.eks.aws_iam_role.eks_node_role" "starttech-eks-node-role"
          import_if_missing "module.storage.aws_ecr_repository.starttech-backend-api" "starttech-backend-api"

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply -auto-approve \
            -target=module.networking \
            -target=module.eks \
            -target=module.storage \
            -target=module.database \
            -var="mongodb_atlas_uri=${{ secrets.MONGODB_ATLAS_URI }}" \
            -var="ci_iam_user_arn=${{ env.CI_IAM_USER_ARN }}"

      - name: Show outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform output

  # ---------------------------------------------------------------
  # STANDALONE: terraform destroy (manual only, requires typed confirmation)
  # ---------------------------------------------------------------
  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_destroy == 'destroy'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Reconcile drifted resources (import if exists in AWS but not in state)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          import_if_missing() {
            local address="$1"
            local id="$2"
            if terraform state list | grep -qx "$address"; then
              echo "Already in state: $address"
            else
              echo "Not in state, attempting import: $address ($id)"
              terraform import -var="ci_iam_user_arn=${{ env.CI_IAM_USER_ARN }}" "$address" "$id" || echo "Import failed or resource doesn't exist — skipping: $address"
            fi
          }

          import_if_missing "module.database.aws_elasticache_subnet_group.starttech" "starttech-redis-subnet-group"
          import_if_missing "module.eks.aws_iam_role.eks_cluster_role" "starttech-eks-cluster-role"
          import_if_missing "module.eks.aws_iam_role.eks_node_role" "starttech-eks-node-role"
          import_if_missing "module.storage.aws_ecr_repository.starttech-backend-api" "starttech-backend-api"

      - name: Terraform Destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform destroy -auto-approve \
            -var="mongodb_atlas_uri=${{ secrets.MONGODB_ATLAS_URI }}" \
            -var="ci_iam_user_arn=${{ env.CI_IAM_USER_ARN }}"